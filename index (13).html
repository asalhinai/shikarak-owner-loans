<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل القروض - شي كراك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;padding:1rem}
.container{max-width:600px;margin:0 auto}
h1{font-size:20px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
h1 i{font-size:22px;color:#1D9E75}

/* Summary */
.top-card{background:#fff;border-radius:16px;border:0.5px solid #e0ddd6;padding:1.25rem;margin-bottom:1rem}
.total-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.total-label{font-size:12px;color:#888;margin-bottom:4px}
.total-amount{font-size:30px;font-weight:700;color:#E24B4A}
.total-amount.zero{color:#1D9E75}
.total-ret{font-size:20px;font-weight:600;color:#1D9E75}
.branch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:0.5px solid #ede9e0}
.bstat{text-align:center;background:#f8f7f3;border-radius:10px;padding:8px}
.bstat .bv{font-size:14px;font-weight:600}
.bstat .bl{font-size:11px;color:#888;margin-top:2px}
.pay-row{display:flex;gap:8px}
.pay-row input{flex:1;border:0.5px solid #d0cdc4;border-radius:10px;padding:10px 12px;font-size:15px;font-family:'Tajawal',sans-serif;background:#fff;outline:none}
.pay-row input:focus{border-color:#1D9E75}
.btn-pay{background:#1D9E75;border:none;color:#fff;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn-pay:active{opacity:.85}

/* Login */
.login-card{background:#fff;border-radius:16px;border:0.5px solid #e0ddd6;padding:2rem;text-align:center;margin-top:2rem}
.login-card h2{font-size:18px;margin-bottom:1rem;color:#333}
.login-card input{width:100%;border:0.5px solid #d0cdc4;border-radius:10px;padding:12px;font-size:16px;font-family:'Tajawal',sans-serif;text-align:center;letter-spacing:4px;margin-bottom:12px;outline:none}
.login-card input:focus{border-color:#1D9E75}
.btn-login{width:100%;background:#1D9E75;border:none;color:#fff;border-radius:10px;padding:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif}
.err{color:#E24B4A;font-size:13px;margin-top:8px}

/* Form */
.form-card{background:#fff;border-radius:16px;border:0.5px solid #e0ddd6;padding:1.25rem;margin-bottom:1rem}
.sec-title{font-size:12px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{border:1.5px solid #d0cdc4;border-radius:20px;padding:6px 14px;font-size:13px;color:#666;cursor:pointer;font-family:'Tajawal',sans-serif;background:#fff;transition:all .15s}
.chip.sel-green{border-color:#1D9E75;background:#E1F5EE;color:#0F6E56;font-weight:600}
.chip.sel-blue{border-color:#378ADD;background:#E6F1FB;color:#185FA5;font-weight:600}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow.full{grid-template-columns:1fr}
.field label{font-size:12px;color:#888;display:block;margin-bottom:5px}
.field input{width:100%;border:0.5px solid #d0cdc4;border-radius:10px;padding:9px 12px;font-size:14px;font-family:'Tajawal',sans-serif;outline:none;background:#fff}
.field input:focus{border-color:#1D9E75}
.btn-row{display:flex;gap:8px;margin-top:4px}
.btn-add{flex:1;background:#1D9E75;border:none;color:#fff;border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-clear{background:#fff;border:0.5px solid #d0cdc4;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;color:#888;font-family:'Tajawal',sans-serif}

/* Filters */
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.fb{font-size:12px;padding:5px 14px;border-radius:20px;border:0.5px solid #d0cdc4;cursor:pointer;background:#fff;color:#888;font-family:'Tajawal',sans-serif}
.fb.act{border-color:#1a1a1a;color:#1a1a1a;font-weight:600}

/* Loans */
.loans-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
.loan-row{background:#fff;border:0.5px solid #e0ddd6;border-radius:14px;padding:1rem 1.25rem}
.lh{display:flex;justify-content:space-between;align-items:flex-start}
.lamount{font-size:18px;font-weight:700}
.lamount.d{color:#E24B4A}
.lamount.s{color:#1D9E75}
.lmeta{display:flex;gap:10px;font-size:12px;color:#888;margin-top:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.bp{background:#FCEBEB;color:#A32D2D}
.br{background:#E1F5EE;color:#0F6E56}
.bx{background:#FAEEDA;color:#854F0B}
.progress-bar{height:4px;background:#ede9e0;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px}
.lnote{font-size:13px;color:#888;margin-top:8px;padding-top:8px;border-top:0.5px solid #ede9e0}
.pay-hist{margin-top:8px;padding-top:8px;border-top:0.5px solid #ede9e0}
.pay-hist-title{font-size:11px;color:#aaa;margin-bottom:4px}
.pay-hist-row{display:flex;justify-content:space-between;font-size:12px;color:#888;padding:2px 0}
.pay-hist-row .pa{color:#1D9E75;font-weight:600}
.la{display:flex;gap:6px;margin-top:10px}
.bsm{font-size:12px;padding:6px 12px;border-radius:8px;border:0.5px solid #d0cdc4;cursor:pointer;background:#fff;color:#555;font-family:'Tajawal',sans-serif}
.bsm.g{background:#E1F5EE;border-color:#9FE1CB;color:#0F6E56}
.bsm.r{color:#E24B4A;border-color:#F7C1C1}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:14px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-family:'Tajawal',sans-serif;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* Loading */
.loading{text-align:center;padding:2rem;color:#888;font-size:14px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #e0ddd6;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.branch-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px}
</style>
</head>
<body>
<div class="container">
  <h1><i class="ti ti-wallet"></i> سجل القروض — شي كراك</h1>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SHEET_ID = '1DiYjVG3uyYyyZ69naBHMVqe9OBINQ_QTyfPrtsHY8T4';
const API_BASE = 'https://shikarak-loans-api.workers.dev';
const PIN = '1999';

var loans = [];
var authed = false;
var selCard = '', selBranch = '', filterStatus = 'all', filterBranch = 'all';
var isLoading = false;

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

function fmtDate(d) {
  if(!d) return '';
  var p = d.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

function branchColor(b) {
  if(b==='الخوض') return '#C8962E';
  if(b==='الحيل') return '#1E6B3C';
  if(b==='بركاء') return '#185FA5';
  return '#888';
}

function cardIcon(c) {
  return c==='راتب'?'ti-credit-card':c==='استثمار'?'ti-building-bank':'ti-shield';
}

// ---- API calls ----
async function apiGet() {
  var res = await fetch(API_BASE + '/loans');
  var data = await res.json();
  return data.loans || [];
}

async function apiAdd(loan) {
  await fetch(API_BASE + '/loans', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(loan)
  });
}

async function apiUpdate(loan) {
  await fetch(API_BASE + '/loans/' + loan.id, {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(loan)
  });
}

async function apiDelete(id) {
  await fetch(API_BASE + '/loans/' + id, { method: 'DELETE' });
}

// ---- Auth ----
function renderLogin() {
  document.getElementById('app').innerHTML =
    '<div class="login-card">' +
    '<i class="ti ti-lock" style="font-size:36px;color:#1D9E75;display:block;margin-bottom:12px"></i>' +
    '<h2>سجل القروض الشخصية</h2>' +
    '<input type="password" id="pin-inp" placeholder="••••" maxlength="6" onkeydown="if(event.key===\'Enter\')doLogin()">' +
    '<button class="btn-login" onclick="doLogin()">دخول</button>' +
    '<div class="err" id="pin-err"></div>' +
    '</div>';
  setTimeout(function(){ var i=document.getElementById('pin-inp'); if(i) i.focus(); }, 100);
}

function doLogin() {
  var v = document.getElementById('pin-inp').value;
  if(v === PIN) {
    authed = true;
    loadAndRender();
  } else {
    document.getElementById('pin-err').textContent = 'الرمز غلط، حاول مرة ثانية';
  }
}

// ---- Load ----
async function loadAndRender() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><br>جاري التحميل...</div>';
  try {
    loans = await apiGet();
  } catch(e) {
    loans = [];
  }
  render();
}

// ---- Actions ----
async function addLoan() {
  if(!selBranch){ toast('اختر الفرع'); return; }
  if(!selCard){ toast('اختر البطاقة'); return; }
  var amt = parseFloat(document.getElementById('inp-amt').value);
  if(!amt||amt<=0){ toast('أدخل مبلغاً صحيحاً'); return; }
  var date = document.getElementById('inp-date').value;
  var reason = document.getElementById('inp-reason').value.trim();
  var loan = {
    id: Date.now().toString(),
    date: date,
    branch: selBranch,
    card: selCard,
    amount: amt,
    returned: 0,
    payments: [],
    status: 'pending',
    reason: reason
  };
  loans.unshift(loan);
  render();
  toast('جاري الحفظ...');
  try { await apiAdd(loan); toast('تم تسجيل القرض ✓'); }
  catch(e) { toast('خطأ في الحفظ'); }
}

async function doQuickPay() {
  var amt = parseFloat(document.getElementById('quickPay').value);
  if(!amt||amt<=0){ toast('أدخل مبلغاً'); return; }
  var remaining = amt;
  var today = new Date().toISOString().split('T')[0];
  var updated = [];
  loans = loans.map(function(l) {
    if(remaining<=0||l.status==='returned') return l;
    var canPay = l.amount - l.returned;
    var pay = Math.min(canPay, remaining);
    remaining -= pay;
    var newRet = l.returned + pay;
    var payments = (l.payments||[]).concat([{date:today, amount:pay}]);
    var nl = Object.assign({}, l, {returned:newRet, payments:payments, status:newRet>=l.amount?'returned':'partial'});
    updated.push(nl);
    return nl;
  });
  document.getElementById('quickPay').value='';
  render();
  toast('جاري الحفظ...');
  try {
    for(var i=0;i<updated.length;i++) await apiUpdate(updated[i]);
    toast('تم تسجيل الدفع ✓');
  } catch(e) { toast('خطأ في الحفظ'); }
}

async function markFull(id) {
  var today = new Date().toISOString().split('T')[0];
  var updated;
  loans = loans.map(function(l) {
    if(l.id!==id) return l;
    var rem = l.amount-l.returned;
    var payments = (l.payments||[]);
    if(rem>0) payments = payments.concat([{date:today,amount:rem}]);
    updated = Object.assign({},l,{returned:l.amount,payments:payments,status:'returned'});
    return updated;
  });
  render();
  toast('جاري الحفظ...');
  try { await apiUpdate(updated); toast('تم ✓'); }
  catch(e) { toast('خطأ في الحفظ'); }
}

async function deleteLoan(id) {
  if(!confirm('تأكيد الحذف؟')) return;
  loans = loans.filter(function(l){ return l.id!==id; });
  render();
  try { await apiDelete(id); toast('تم الحذف'); }
  catch(e) { toast('خطأ في الحذف'); }
}

// ---- Render ----
function render() {
  var totalPending=0, totalRet=0;
  var bp = {الخوض:0, الحيل:0, بركاء:0};
  loans.forEach(function(l) {
    var rem = l.amount - l.returned;
    totalPending += rem;
    totalRet += l.returned;
    if(bp[l.branch]!==undefined) bp[l.branch]+=rem;
    else if(l.branch==='عام'){ bp['الخوض']+=rem/3; bp['الحيل']+=rem/3; bp['بركاء']+=rem/3; }
  });

  var filtered = loans.filter(function(l) {
    var ms = filterStatus==='all'||l.status===filterStatus;
    var mb = filterBranch==='all'||l.branch===filterBranch;
    return ms&&mb;
  });

  var html = '';

  // Summary
  html += '<div class="top-card">';
  html += '<div class="total-row">';
  html += '<div><div class="total-label">إجمالي مستحق للمالك</div>';
  html += '<div class="total-amount'+(totalPending<=0?' zero':'')+'">'+totalPending.toFixed(3)+' <span style="font-size:16px">OMR</span></div></div>';
  html += '<div style="text-align:left"><div class="total-label">مسترجَع</div><div class="total-ret">'+totalRet.toFixed(3)+' OMR</div></div>';
  html += '</div>';
  html += '<div class="branch-stats">';
  html += '<div class="bstat"><div class="bv" style="color:#C8962E">'+bp['الخوض'].toFixed(3)+'</div><div class="bl">الخوض</div></div>';
  html += '<div class="bstat"><div class="bv" style="color:#1E6B3C">'+bp['الحيل'].toFixed(3)+'</div><div class="bl">الحيل</div></div>';
  html += '<div class="bstat"><div class="bv" style="color:#185FA5">'+bp['بركاء'].toFixed(3)+'</div><div class="bl">بركاء</div></div>';
  html += '</div>';
  html += '<div class="pay-row">';
  html += '<input type="number" id="quickPay" placeholder="المبلغ المدفوع (OMR)" step="0.001" min="0">';
  html += '<button class="btn-pay" onclick="doQuickPay()"><i class="ti ti-cash"></i> دفع</button>';
  html += '</div></div>';

  // Form
  html += '<div class="form-card">';
  html += '<div class="sec-title">تسجيل قرض جديد</div>';
  html += '<div style="margin-bottom:10px"><div style="font-size:12px;color:#888;margin-bottom:6px">الفرع</div><div class="chips">';
  ['الخوض','الحيل','بركاء','عام'].forEach(function(b) {
    html += '<button class="chip'+(selBranch===b?' sel-blue':'')+'" onclick="setSel(\'branch\',\''+b+'\')">'+b+'</button>';
  });
  html += '</div></div>';
  html += '<div style="margin-bottom:10px"><div style="font-size:12px;color:#888;margin-bottom:6px">البطاقة</div><div class="chips">';
  ['راتب','استثمار','طوارئ'].forEach(function(c) {
    html += '<button class="chip'+(selCard===c?' sel-green':'')+'" onclick="setSel(\'card\',\''+c+'\')"><i class="ti '+cardIcon(c)+'"></i> بطاقة '+c+'</button>';
  });
  html += '</div></div>';
  html += '<div class="frow"><div class="field"><label>المبلغ (OMR)</label><input type="number" id="inp-amt" placeholder="0.000" step="0.001" min="0"></div>';
  html += '<div class="field"><label>التاريخ</label><input type="date" id="inp-date" value="'+new Date().toISOString().split('T')[0]+'"></div></div>';
  html += '<div class="frow full"><div class="field"><label>السبب (اختياري)</label><input type="text" id="inp-reason" placeholder="مثال: رواتب، مشتريات..."></div></div>';
  html += '<div class="btn-row"><button class="btn-clear" onclick="clearForm()">مسح</button>';
  html += '<button class="btn-add" onclick="addLoan()"><i class="ti ti-plus"></i> تسجيل</button></div></div>';

  // Filters
  html += '<div class="filter-row">';
  ['all','pending','partial','returned'].forEach(function(f) {
    var lbl = f==='all'?'الكل':f==='pending'?'معلق':f==='partial'?'جزئي':'مكتمل';
    html += '<button class="fb'+(filterStatus===f?' act':'')+'" onclick="setF(\''+f+'\',\'status\')">'+lbl+'</button>';
  });
  html += '</div>';
  html += '<div class="filter-row">';
  ['all','الخوض','الحيل','بركاء','عام'].forEach(function(f) {
    var lbl = f==='all'?'كل الفروع':f;
    html += '<button class="fb'+(filterBranch===f?' act':'')+'" onclick="setF(\''+f+'\',\'branch\')">'+lbl+'</button>';
  });
  html += '</div>';

  // List
  html += '<div class="loans-list">';
  if(!filtered.length) {
    html += '<div class="empty"><i class="ti ti-notes" style="font-size:28px;display:block;margin-bottom:8px"></i>لا توجد سجلات</div>';
  } else {
    filtered.forEach(function(l) {
      var rem = l.amount - l.returned;
      var pct = l.amount>0 ? Math.round((l.returned/l.amount)*100) : 0;
      var amtCls = l.status==='returned'?'s':'d';
      var bdgCls = l.status==='returned'?'br':l.status==='partial'?'bx':'bp';
      var bdgTxt = l.status==='returned'?'مرتجع':l.status==='partial'?'جزئي':'معلق';
      var payments = l.payments||[];

      html += '<div class="loan-row">';
      html += '<div class="lh"><div>';
      html += '<div class="lamount '+amtCls+'">'+l.amount.toFixed(3)+' OMR</div>';
      html += '<div class="lmeta">';
      html += '<span style="color:'+branchColor(l.branch)+';font-weight:600"><span class="branch-dot" style="background:'+branchColor(l.branch)+'"></span>'+l.branch+'</span>';
      html += '<span><i class="ti '+cardIcon(l.card)+'"></i> '+l.card+'</span>';
      html += '<span><i class="ti ti-calendar"></i> '+fmtDate(l.date)+'</span>';
      if(rem>0&&l.status!=='returned') html += '<span style="color:#E24B4A">متبقي '+rem.toFixed(3)+'</span>';
      html += '</div></div>';
      html += '<span class="badge '+bdgCls+'">'+bdgTxt+'</span></div>';
      html += '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
      if(l.reason) html += '<div class="lnote"><i class="ti ti-notes" style="font-size:12px"></i> '+l.reason+'</div>';
      if(payments.length) {
        html += '<div class="pay-hist"><div class="pay-hist-title">سجل الدفعات</div>';
        payments.forEach(function(p){ html += '<div class="pay-hist-row"><span>'+fmtDate(p.date)+'</span><span class="pa">+'+p.amount.toFixed(3)+' OMR</span></div>'; });
        html += '</div>';
      }
      html += '<div class="la">';
      if(l.status!=='returned') html += '<button class="bsm g" onclick="markFull(\''+l.id+'\')"><i class="ti ti-check"></i> مرتجع كلياً</button>';
      html += '<button class="bsm r" onclick="deleteLoan(\''+l.id+'\')"><i class="ti ti-trash"></i></button>';
      html += '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('app').innerHTML = html;
}

function setSel(type, val) {
  if(type==='card') selCard=val;
  else selBranch=val;
  render();
}

function clearForm() {
  selCard=''; selBranch='';
  render();
}

function setF(val, type) {
  if(type==='status') filterStatus=val;
  else filterBranch=val;
  render();
}

// Start
renderLogin();
</script>
</body>
</html>
